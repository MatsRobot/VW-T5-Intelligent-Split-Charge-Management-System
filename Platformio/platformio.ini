; --- Project Environment Configuration ---
[env:nanoatmega328]
platform = atmelavr         ; Specifies the Atmel AVR platform for Arduino-compatible boards
framework = arduino         ; Uses the Arduino software framework

; --- Board & Bootloader Selection ---
; Use the following line for Nanos with the "Old Bootloader" (commonly used on clones)
board = nanoatmega328
board_build.mcu = atmega328p
board_build.f_cpu = 16000000L
; To use the "New Bootloader" (standard on official Arduino Nanos), comment out the 'board' line above 
; and uncomment the line below:
; board = nanoatmega328new

; --- Library Dependencies ---
; PlatformIO will automatically download and manage these libraries
lib_deps =
    greiman/SSD1306Ascii @ ^1.3.5   ; Fast, lightweight library for the OLED display
    adafruit/Adafruit INA219 @ ^1.2.3 ; Driver for the dual current/voltage sensors
    adafruit/RTClib @ ^2.1.1        ; Management for the DS3231 Real Time Clock
    arduino-libraries/SD @ ^1.2.4   ; Handling for the CSV data logging to SD card

; --- Serial Monitor Settings ---
; Adjusting the baud rate to match your code's Serial.begin(rate)
monitor_speed = 9600