; =====================================================================================
; PROJECT: VW-T5-Intelligent-BMS (Version 1.0)
; FILE: platformio.ini
; =====================================================================================
;
; WHAT IS THIS FILE?
; This is the configuration file for PlatformIO. It acts as the "instruction manual" 
; for the compiler. It tells the system which hardware you are using and which 
; external software libraries need to be downloaded to make the sensors work.
;
; =====================================================================================

[env:nanoatmega328]
; 1. HARDWARE PLATFORM
; This tells the system we are using an Atmel AVR based chip (the family of 
; microcontrollers that powers most standard Arduinos).
platform = atmelavr

; 2. BOARD TYPE
; Specifies the exact board is an Arduino Nano with the ATmega328P processor.
board = nanoatmega328

; 3. SOFTWARE FRAMEWORK
; Tells PlatformIO to use the standard Arduino programming language and core files.
framework = arduino

; 4. LIBRARY DEPENDENCIES
; This is the most important section. These are the specific "drivers" required 
; for our hardware. PlatformIO will automatically find and download these for you.
lib_deps =
    ; --- DISPLAY ---
    ; A very lightweight library for the SSD1306 OLED screen. We use the 'Ascii' 
    ; version to save memory for the actual BMS logic.
    greiman/SSD1306Ascii @ ^1.3.5

    ; --- POWER TELEMETRY ---
    ; The driver for the INA219 sensors that measure the Voltage and Amperage 
    ; from the alternator and leisure battery.
    adafruit/Adafruit INA219 @ ^1.2.3

    ; --- TIME KEEPING ---
    ; The driver for the DS3231 Real-Time Clock (RTC) so the system knows the 
    ; exact date and time for data logging.
    adafruit/RTClib @ ^2.1.1

    ; --- STORAGE ---
    ; The standard library required to communicate with the Micro SD Card module 
    ; to save the .CSV log files.
    arduino-libraries/SD @ ^1.2.4

    ; --- TEMPERATURE (PROTOCOL) ---
    ; The "OneWire" protocol library. This is the underlying communication language 
    ; used by many digital sensors.
    paulstoffregen/OneWire @ ^2.3.7

    ; --- TEMPERATURE (SENSOR) ---
    ; The specific driver for the DS18B20 digital thermometer that monitors 
    ; the internal enclosure temperature.
    milesburton/DallasTemperature @ ^3.9.1
